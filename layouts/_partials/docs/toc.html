{{ partial "docs/inject/toc-before" . }}
<div class="toc-header">目录</div>
{{ .TableOfContents }}
{{ partial "docs/inject/toc-after" . }}

<script>
  (function() {
    var scripts = document.getElementsByTagName('script');
    var me = scripts[scripts.length - 1];
    var toc = me.parentElement.querySelector('nav');
    if (!toc) return;

    function processLevel(ul, depth) {
      if (!ul) return;
      var lis = ul.children;
      for (var i = 0; i < lis.length; i++) {
        var li = lis[i];
        if (li.tagName !== 'LI') continue;

        var childUl = null;
        for (var j = 0; j < li.children.length; j++) {
          if (li.children[j].tagName === 'UL') {
            childUl = li.children[j];
            break;
          }
        }

        var link = li.querySelector('a');

        if (!link && childUl) { processLevel(childUl, depth); continue; }
        if (!link) continue;

        li.classList.add('toc-level-' + depth);

        if (childUl) {
          li.classList.add('toc-parent');

          var toggle = document.createElement('span');
          toggle.className = 'toc-toggle';
          li.insertBefore(toggle, link);

          toggle.addEventListener('click', function(e) {
            e.stopPropagation();
            e.preventDefault();
            var parentLi = this.parentNode;
            parentLi.classList.toggle('toc-collapsed');
          });

          if (depth >= 4) {
            li.classList.add('toc-collapsed');
          }

          processLevel(childUl, depth + 1);
        }
      }
    }

    var topUl = toc.querySelector('ul');

    // ========================================
    // 全局折叠 / 展开按钮（放在最前面，确保渲染）
    // ========================================
    var toolbar = document.createElement('div');
    toolbar.className = 'toc-toolbar';
    toolbar.innerHTML =
      '<button class="toc-btn-collapse-all" title="折叠全部">折叠</button>' +
      '<button class="toc-btn-expand-all" title="展开全部">展开</button>';
    toc.insertBefore(toolbar, toc.firstChild);

    toolbar.querySelector('.toc-btn-collapse-all').addEventListener('click', function() {
      var parents = toc.querySelectorAll('.toc-parent');
      for (var i = 0; i < parents.length; i++) {
        parents[i].classList.add('toc-collapsed');
      }
    });

    toolbar.querySelector('.toc-btn-expand-all').addEventListener('click', function() {
      var collapsed = toc.querySelectorAll('.toc-collapsed');
      for (var i = 0; i < collapsed.length; i++) {
        collapsed[i].classList.remove('toc-collapsed');
      }
    });

    if (topUl) processLevel(topUl, 2);

    // ========================================
    // 滚动追踪
    // ========================================
    var links = toc.querySelectorAll('a[href^="#"]');
    if (!links.length) return;

    var headings = [];
    links.forEach(function(a) {
      var id = a.getAttribute('href').slice(1);
      var el = document.getElementById(id);
      if (el) headings.push({ link: a, el: el });
    });

    if (!headings.length) return;

    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        var link = null;
        for (var k = 0; k < headings.length; k++) {
          if (headings[k].el === e.target) { link = headings[k].link; break; }
        }
        if (!link) return;
        if (e.isIntersecting) {
          link.classList.add('toc-active');
        } else {
          link.classList.remove('toc-active');
        }
      });
    }, { rootMargin: '-20% 0px -60% 0px', threshold: 0 });

    headings.forEach(function(h) { observer.observe(h.el); });
  })();
</script>
